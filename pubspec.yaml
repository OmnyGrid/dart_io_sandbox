name: dart_io_sandbox
description: >-
  A Zone-based filesystem and process sandbox for Dart, built on IOOverrides.
  Confines all dart:io filesystem access to a configured root directory, blocks
  path-traversal and symlink escapes, enforces read-only / allow / deny
  policies, and gates process execution behind an allowlist. Includes a
  dart_io_sandbox CLI to run dart tests in sandbox mode.
version: 1.2.1
repository: https://github.com/OmnyGrid/dart_io_sandbox

environment:
  sdk: ^3.10.0

executables:
  dart_io_sandbox:

dependencies:
  path: ^1.9.0
  file: ^7.0.0
  command_shield: ^1.0.1
  # CLI (`dart_io_sandbox`) dependencies. `test_core`/`test_api` back the runner
  # the same way `package:test`'s own executable does (it imports
  # `package:test_core` `src/executable.dart` + `hack_register_platform.dart`).
  # They are runtime deps because `bin/dart_io_sandbox.dart` uses them;
  # library-only consumers still get them transitively, which is the cost of
  # bundling the CLI in this package.
  args: ^2.5.0
  yaml: ^3.1.2
  async: ^2.11.0
  stream_channel: ^2.1.2
  test_core: ^0.6.18
  test_api: ^0.7.12

dev_dependencies:
  dependency_validator: ^5.0.5
  lints: ^6.0.0
  test: ^1.25.6
